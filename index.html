<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>میلاد خبر</title>

<link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.1/Vazirmatn-font-face.css" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Vazirmatn,tahoma;
background:#f2f3f5;
}


header{

background:#111827;
color:white;
padding:25px;

}


.logo{

font-size:35px;
font-weight:bold;

}

nav{

margin-top:20px;

}

nav a{

color:white;
text-decoration:none;
margin-left:20px;

}



.container{

max-width:1200px;
margin:auto;
padding:20px;

}



.hot{

background:#dc2626;
color:white;
padding:15px;
border-radius:12px;
margin-bottom:20px;

}



.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;

}



.card{

background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 5px 20px #0002;

}



.card img{

width:100%;
height:180px;
object-fit:cover;

}



.content{

padding:20px;

}


h2{

font-size:20px;

}


button{

background:#2563eb;
border:0;
color:white;
padding:10px 20px;
border-radius:10px;
cursor:pointer;

}


footer{

background:#111827;
color:white;
padding:30px;
text-align:center;
margin-top:40px;

}

</style>

</head>


<body>


<header>

<div class="logo">
📰 میلاد خبر
</div>


<nav>

<a href="#">خانه</a>
<a href="#">سیاسی</a>
<a href="#">اقتصادی</a>
<a href="#">ورزشی</a>
<a href="#">تکنولوژی</a>

</nav>


</header>



<div class="container">


<div class="hot">

🔥 آخرین اخبار لحظه‌ای میلاد خبر

</div>



<div class="grid" id="news">


</div>


</div>



<footer>

تمام حقوق برای میلاد خبر محفوظ است

</footer>




<script>


fetch("news.json")

.then(r=>r.json())

.then(data=>{


let box=document.getElementById("news");


data.forEach(n=>{


box.innerHTML+=`

<div class="card">


<img src="https://picsum.photos/600/300">


<div class="content">


<h2>${n.title}</h2>


<p>

${n.description.substring(0,150)}

</p>


<button onclick="openNews('${n.link}')">

ادامه مطلب

</button>


</div>


</div>


`;


});


});



function openNews(url){

window.location.href="article.html?url="+encodeURIComponent(url);

}


</script>


</body>

</html>
