<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>میلاد خبر | آخرین اخبار ایران و جهان</title>


<link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.1/Vazirmatn-font-face.css" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
background:#f3f4f6;
font-family:Vazirmatn,Tahoma;
color:#222;

}


/* header */

header{

background:white;
height:90px;
padding:15px 25px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 3px 15px #0002;

}



.logo{

font-size:35px;
font-weight:900;

}



.logo span{

color:#e11d48;
font-size:45px;

}



.logo small{

display:block;
font-size:12px;
color:#777;
font-weight:normal;

}



.icons{

font-size:30px;
color:#555;

}



.icons span{

margin-right:15px;

}



/* menu */


nav{

background:#111827;
padding:15px;
text-align:center;

}


nav a{

color:white;
text-decoration:none;
margin:0 12px;
font-size:16px;

}



/* container */


.container{

max-width:1200px;
margin:auto;
padding:20px;

}



/* top news */


.top-news{

background:
linear-gradient(135deg,#e11d48,#7c3aed);

color:white;

padding:25px;

border-radius:25px;

font-size:22px;

margin-bottom:25px;

}



/* cards */


.news-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}



.card{

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:0 10px 30px #0002;

transition:.3s;

}



.card:hover{

transform:translateY(-5px);

}



.card img{

width:100%;

height:230px;

object-fit:cover;

background:#ddd;

}



.content{

padding:25px;

}



.category{

color:#e11d48;
font-size:14px;
font-weight:bold;

}



h2{

font-size:23px;

line-height:1.8;

}



p{

font-size:16px;

line-height:2;

color:#555;

}



button{

background:#2563eb;

color:white;

border:0;

padding:13px 25px;

border-radius:12px;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#1d4ed8;

}



/* footer */


footer{

background:#111827;

color:white;

text-align:center;

padding:30px;

margin-top:40px;

}



@media(max-width:600px){


.logo{

font-size:25px;

}


.card img{

height:200px;

}


h2{

font-size:20px;

}


}

</style>


</head>



<body>



<header>


<div class="logo">

<span>✦</span>
میلاد خبر

<small>
آخرین اخبار ایران و جهان
</small>


</div>



<div class="icons">

<span>⌕</span>

<span>♙</span>

</div>


</header>




<nav>

<a href="#">خانه</a>

<a href="#">سیاسی</a>

<a href="#">اقتصادی</a>

<a href="#">ورزشی</a>

<a href="#">تکنولوژی</a>

<a href="#">فرهنگی</a>

</nav>





<div class="container">



<div class="top-news">

🔥 جدیدترین خبرهای روز در میلاد خبر

</div>




<div class="news-grid" id="news">


</div>



</div>






<footer>

📰 میلاد خبر

<br>

مرجع اخبار ایران و جهان

</footer>







<script>


fetch("news.json")


.then(response=>response.json())


.then(data=>{


let box=document.getElementById("news");



data.forEach((n,index)=>{


box.innerHTML += `


<div class="card">


<img src="${n.image}"

onerror="this.src='https://via.placeholder.com/900x500?text=Milad+News'">



<div class="content">


<div class="category">

اخبار روز

</div>



<h2>

${n.title}

</h2>



<p>

${n.description.substring(0,180)}

...

</p>



<button onclick="openNews(${index})">

ادامه مطلب

</button>



</div>


</div>



`;



});



})



.catch(error=>{


document.getElementById("news").innerHTML=

"خطا در دریافت اخبار";


});





function openNews(id){


window.location.href=

"article.html?id="+id;


}



</script>



</body>

</html>
