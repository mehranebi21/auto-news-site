<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>میلاد خبر | آخرین اخبار ایران و جهان</title>


<link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003.1/Vazirmatn-font-face.css" rel="stylesheet">


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
background:#f5f6f8;
font-family:Vazirmatn,Tahoma;
color:#222;

}



/* header */


header{

background:white;
padding:20px 25px;
box-shadow:0 3px 15px #0001;

display:flex;
align-items:center;
justify-content:space-between;

position:sticky;
top:0;
z-index:10;

}



.logo{

font-size:35px;
font-weight:900;

}


.logo span{

color:#e11d48;
font-size:45px;

}


.logo small{

display:block;
font-size:12px;
color:#777;
font-weight:normal;

}



.icons{

font-size:28px;
color:#555;

}


.icons span{

margin-right:15px;

}





nav{

background:#111827;
padding:15px;
text-align:center;

}



nav a{

color:white;
text-decoration:none;
margin:0 12px;
font-size:16px;

}




.container{

max-width:1200px;
margin:auto;
padding:20px;

}



/* خبر ویژه */


.feature{

background:linear-gradient(135deg,#111827,#374151);
color:white;

padding:25px;

border-radius:25px;

margin-bottom:25px;

font-size:22px;

}





/* cards */


.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}



.card{

background:white;

border-radius:25px;

overflow:hidden;

box-shadow:
0 10px 30px rgba(0,0,0,.10);

transition:.3s;

}



.card:hover{

transform:translateY(-7px);

}



.card img{

width:100%;

height:230px;

object-fit:cover;

background:#ddd;

}



.content{

padding:25px;

}



.category{

color:#e11d48;

font-size:14px;

font-weight:bold;

}



h2{

font-size:23px;

line-height:1.8;

margin:10px 0;

}



p{

font-size:16px;

line-height:2;

color:#555;

}



button{

background:#2563eb;

color:white;

border:0;

padding:14px 25px;

border-radius:12px;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#1d4ed8;

}



/* footer */


footer{

background:#111827;

color:white;

text-align:center;

padding:30px;

margin-top:40px;

}





@media(max-width:600px){


.logo{

font-size:25px;

}


.logo span{

font-size:35px;

}


h2{

font-size:20px;

}


.card img{

height:200px;

}


}


</style>


</head>


<body>



<header>


<div class="logo">

<span>✦</span>
میلاد خبر

<small>
آخرین اخبار ایران و جهان
</small>

</div>



<div class="icons">

<span>⌕</span>

<span>♙</span>

</div>


</header>




<nav>

<a href="#">خانه</a>

<a href="#">سیاسی</a>

<a href="#">اقتصادی</a>

<a href="#">ورزشی</a>

<a href="#">تکنولوژی</a>

<a href="#">فرهنگی</a>

</nav>





<div class="container">


<div class="feature">

🔥 آخرین اخبار لحظه‌ای میلاد خبر

</div>



<div class="grid" id="news">


</div>



</div>




<footer>

📰 میلاد خبر

<br>

مرجع اخبار ایران و جهان

</footer>






<script>



fetch("news.json")

.then(response=>response.json())

.then(data=>{


let box=document.getElementById("news");



data.forEach(n=>{


box.innerHTML += `


<div class="card">



<img src="${n.image}" 

onerror="this.src='https://via.placeholder.com/800x450?text=Milad+News'">


<div class="content">


<div class="category">

اخبار روز

</div>



<h2>

${n.title}

</h2>



<p>

${n.description.substring(0,180)}

...

</p>



<button onclick="openNews('${n.link}')">

ادامه مطلب

</button>



</div>


</div>


`;



});


})

.catch(error=>{


document.getElementById("news").innerHTML=

"خطا در دریافت اخبار";


});






function openNews(url){


window.location.href=

"article.html?url="+encodeURIComponent(url);


}



</script>



</body>

</html>
