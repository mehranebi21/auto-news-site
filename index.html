<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>اخبار روز</title>

<style>
body{
font-family:tahoma;
direction:rtl;
background:#f5f5f5;
}

.news{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

a{
color:#0066cc;
}
</style>

</head>

<body>

<h1>آخرین اخبار</h1>

<div id="news"></div>


<script>

fetch("news.json")
.then(r=>r.json())
.then(data=>{

let box=document.getElementById("news");

data.forEach(n=>{

box.innerHTML += `
<div class="news">
<h2>${n.title}</h2>
<p>${n.description}</p>
<a href="${n.link}">
ادامه خبر
</a>
</div>
`;

});

});

</script>

</body>
</html>
